<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>باشر - مرور SM</title>
    <style>
        :root { --green: #059669; --dark: #020617; --light: #ffffff; }
        body { background-color: #064e3b; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        
        /* تصميم الجوال */
        .phone { width: 350px; height: 650px; background: var(--dark); border-radius: 40px; border: 8px solid #1e293b; box-shadow: 0 0 50px rgba(0,0,0,0.5); overflow-y: auto; position: relative; padding: 20px; color: white; }
        
        .ticker { background: #000; color: #fbbf24; padding: 10px; border-radius: 10px; margin-bottom: 20px; font-weight: bold; overflow: hidden; }
        .ticker-text { display: inline-block; animation: scroll 15s linear infinite; }
        @keyframes scroll { from { transform: translateX(100%); } to { transform: translateX(-100%); } }

        input, button { width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; border: none; font-size: 1.1rem; }
        input { background: #0f172a; color: white; border: 1px solid var(--green); }
        button { background: var(--green); color: white; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { transform: scale(1.05); }
        
        .page { display: none; }
        .active { display: block; }
    </style>
</head>
<body>

<div class="phone">
    <div class="ticker"><div class="ticker-text">🚨 وطن لا نحميه لا نستحق العيش فيه | باشر عملك بكل تفاني 🚨</div></div>

    <!-- صفحة الدخول -->
    <div id="login-page" class="page active">
        <h2 style="text-align:center;">دخول النظام</h2>
        <input type="text" id="username" placeholder="أدخل اسمك الكريم">
        <button onclick="login()">دخول للجوال</button>
    </div>

    <!-- الصفحة الرئيسية -->
    <div id="main-page" class="page">
        <h2 id="welcome-msg" style="color:var(--green);"></h2>
        <button onclick="showApp('mokhalafa')">إعطاء مخالفة</button>
        <button onclick="showApp('hajz')">نظام الحجز</button>
        <button onclick="showApp('taameem')">إرسال تعميم</button>
        <button onclick="location.reload()" style="background:#dc2626;">خروج</button>

        <div id="app-content" style="margin-top:20px;"></div>
    </div>
</div>

<script>
    const webhookURL = "https://discord.com/api/webhooks/1508207666890280971/hNlsSSJ0TosA6NnUTwPjgfZZE-PIJdPpIijAId6ZkCSDLUL1yi--jUWW3HsQrmTvyjJ5";
    let userName = "";

    function login() {
        userName = document.getElementById('username').value;
        if(userName) {
            document.getElementById('login-page').classList.remove('active');
            document.getElementById('main-page').classList.add('active');
            document.getElementById('welcome-msg').innerText = "أهلاً بك يا " + userName;
        }
    }

    function showApp(type) {
        let html = "";
        if(type === 'mokhalafa') {
            html = `<h3>مخالفة مرورية</h3>
            <input type="text" id="cop" value="${userName}" readonly>
            <input type="text" id="player" placeholder="اسم الشخص">
            <input type="text" id="reason" placeholder="السبب">
            <input type="number" id="price" placeholder="المبلغ">
            <button onclick="send('مخالفة', ['cop','player','reason','price'])">إرسال</button>`;
        } else if(type === 'hajz') {
            html = `<h3>نظام الحجز</h3>
            <input type="text" id="cop" value="${userName}" readonly>
            <input type="text" id="player" placeholder="اسم الشخص">
            <input type="text" id="reason" placeholder="سبب الحجز">
            <input type="text" id="dur" placeholder="المدة">
            <button onclick="send('حجز', ['cop','player','reason','dur'])">تنفيذ</button>`;
        } else {
            html = `<h3>تعميم أمني</h3>
            <input type="text" id="d_name" placeholder="ديسكورد">
            <input type="text" id="r_name" placeholder="روبلوكس">
            <button onclick="send('تعميم', ['d_name','r_name'])">تعميم</button>`;
        }
        document.getElementById('app-content').innerHTML = html;
    }

    async function send(title, fields) {
        let msg = `**${title}**\nعن طريق: ${userName}\n`;
        fields.forEach(f => { msg += `- ${document.getElementById(f).placeholder || f}: ${document.getElementById(f).value}\n`; });
        await fetch(webhookURL, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ content: msg }) });
        alert("تم رفع البلاغ بنجاح!");
    }
</script>

</body>
</html>
