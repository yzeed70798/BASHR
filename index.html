<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نظام باشر - مرور SM</title>
    <style>
        :root { --main-green: #065f46; --light-green: #10b981; --bg-dark: #020617; }
        body { background-color: var(--main-green); color: white; font-family: sans-serif; margin: 0; padding: 20px; }
        
        /* الإعلان المتحرك */
        .ticker { background: #000; color: #fbbf24; padding: 10px; border-radius: 10px; overflow: hidden; white-space: nowrap; margin-bottom: 20px; font-size: 1.2rem; font-weight: bold; }
        .ticker-text { display: inline-block; animation: scroll 15s linear infinite; }
        @keyframes scroll { from { transform: translateX(100%); } to { transform: translateX(-100%); } }

        .container { max-width: 600px; margin: auto; background: var(--bg-dark); padding: 40px; border-radius: 25px; border: 3px solid #059669; }
        h1, h3 { text-align: center; color: var(--light-green); }
        input { width: 100%; padding: 20px; margin: 10px 0; border-radius: 15px; border: 2px solid #334155; background: #0f172a; color: white; font-size: 1.2rem; box-sizing: border-box; }
        button { width: 100%; padding: 20px; background: var(--light-green); border: none; border-radius: 15px; color: white; font-size: 1.4rem; font-weight: bold; cursor: pointer; margin-top: 15px; }
        
        .page { display: none; }
        .page.active { display: block; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 30px; }
    </style>
</head>
<body>

<div class="ticker">
    <div class="ticker-text">🚨 الرجاء من جميع الوحدات أن تباشر عملها بنظام وجد.. وشعارنا: وطن لا نحميه لا نستحق العيش فيه. 🚨</div>
</div>

    <h1>تسجيل دخول المرور</h1>

    <button onclick="login()">دخول للنظام</button>
</div>

        <button onclick="showTab('taameem')">التعاميم</button>
        <button onclick="logout()" style="background: #ef4444;">خروج</button>
    </div>
